<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Byte 데더</title>
    <style>
        body {
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 20px;
            border: 1px solid #f1f5f9;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .window-controls {
            display: flex;
            gap: 6px;
        }
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }
        .music-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            opacity: 0.3;
            transition: opacity 0.3s ease;
            fill: #1e293b;
        }
        .music-icon.playing {
            opacity: 1;
        }
        .card {
            background-color: #ffffff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
        }
        .profile {
            text-align: center;
        }
        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #e2e8f0;
            margin: 0 auto 16px;
            display: block;
            object-fit: cover;
            border: 2px solid #f1f5f9;
        }
        .profile h1 {
            font-size: 20px;
            margin: 0;
            color: #1e293b;
        }
        .btn-discord {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 20px;
            background-color: #5865F2;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }
        .btn-discord:hover {
            background-color: #4752C4;
        }
        .section-title {
            font-size: 18px;
            margin: 0 0 12px 0;
            color: #1e293b;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }
        .text-content {
            color: #475569;
            font-size: 14px;
            line-height: 1.5;
        }
        .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .project-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #e2e8f0;
            font-size: 13px;
            color: #475569;
        }
        .project-item:last-child {
            border-bottom: none;
        }
        .project-info {
            flex-grow: 1;
        }
        .btn-small {
            display: inline-block;
            padding: 6px 12px;
            background-color: #f1f5f9;
            color: #475569;
            text-decoration: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s ease;
            white-space: nowrap;
            margin-left: 10px;
        }
        .btn-small:hover {
            background-color: #e2e8f0;
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="window-controls">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <svg class="music-icon" id="musicBtn" onclick="toggleBGM()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
            </svg>
        </div>

        <div class="card profile">
            <img src="https://cdn.discordapp.com/attachments/1470463589037903914/1500842310509007139/IMG_2046.jpg?ex=69f9e7d3&is=69f89653&hm=6f46f12fb1cb884b06f0fbdce38042cf928cfe9c383e4d98c62973f931f05914" alt="Profile" class="profile-img">
            <h1># 𝐙𝐱 데더</h1>
            <a href="https://discord.gg/WB77Vejj" target="_blank" class="btn-discord">친추하기</a>
        </div>

        <div class="card text-content">
            <h2 class="section-title" style="border:none; padding:0;">안녕하세요. 데더입니다 :)</h2>
            <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 12px 0;">
            학생 개발자 및 Team Byte 주인으로 활동 중입니다.
        </div>

        <div class="card">
            <h2 class="section-title">참가 프로젝트/활동</h2>
            <ul class="project-list">
                <li class="project-item">
                    <span class="project-info">2026.05 - 현재 | Team Byte 서비스 (현)</span>
                    <a href="https://discord.gg/Bm6aGyRjKZ" target="_blank" class="btn-small">서버 구경가기</a>
                </li>
                <li class="project-item">
                    <span class="project-info">2026.05 - 현재 | AFN API DEV (현)</span>
                </li>
                <li class="project-item">
                    <span class="project-info">2026.04 - 현재 | NoT Guard (현)</span>
                </li>
                <li class="project-item">
                    <span class="project-info">2025.?? - 2025.?? | Team height (구)</span>
                </li>
            </ul>
        </div>
    </div>

    <div id="youtube-player" style="display: none;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        var isPlaying = false;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 'dHFJXMIJkKU',
                playerVars: {
                    'autoplay': 0,
                    'controls': 0,
                    'loop': 1,
                    'playlist': 'dHFJXMIJkKU'
                }
            });
        }

        function toggleBGM() {
            var btn = document.getElementById('musicBtn');
            
            if (!isPlaying) {
                player.playVideo();
                isPlaying = true;
                btn.classList.add('playing');
            } else {
                player.pauseVideo();
                isPlaying = false;
                btn.classList.remove('playing');
            }
        }
    </script>
</body>
</html>
